name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests
          pip install -e .
      
      - name: Run mypy
        run: mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      
      - name: Run tests
        run: pytest tests/ -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest-cov
      
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=nvidia_inst --cov-report=term-missing
      
      - name: Generate XML report
        run: pytest tests/ --cov=nvidia_inst --cov-report=xml
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  e2e-table:
    name: E2E Table Display (distro matrix)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      matrix:
        distro: ['ubuntu:22.04', 'ubuntu:24.04', 'fedora:40']
    container: ${{ matrix.distro }}
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Python (Ubuntu)
        if: contains(matrix.distro, 'ubuntu')
        run: |
          apt-get update && apt-get install -y python3 python3-pip

      - name: Install Python (Fedora)
        if: contains(matrix.distro, 'fedora')
        run: |
          dnf install -y python3 python3-pip

      - name: Install dependencies (Ubuntu 24.04+)
        if: matrix.distro == 'ubuntu:24.04'
        run: |
          pip install --break-system-packages -e . pytest

      - name: Install dependencies (Ubuntu 22.04)
        if: matrix.distro == 'ubuntu:22.04'
        run: |
          pip install -e . pytest

      - name: Install dependencies (Fedora)
        if: contains(matrix.distro, 'fedora')
        run: |
          pip install -e . pytest

      - name: Run E2E table tests
        run: pytest tests/test_driver_state_e2e.py -v
