name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fedora:
    name: Fedora
    runs-on: ubuntu-latest
    container: fedora:rawhide
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install system dependencies
        run: dnf install -y python3 python3-pip git curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and package
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run DNF package manager tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_dnf.py -v

      - name: Run distro detection tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_distro.py -v

      - name: Run CLI installer tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cli_installer.py -v

      - name: Run CUDA installation tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cuda_installation.py -v

      - name: Run secure boot tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_secure_boot.py -v

  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3 python3-pip git curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and package
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run APT package manager tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_apt.py -v

      - name: Run distro detection tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_distro.py -v

      - name: Run CLI installer tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cli_installer.py -v

      - name: Run CUDA installation tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cuda_installation.py -v

      - name: Run secure boot tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_secure_boot.py -v

  arch:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install system dependencies
        run: pacman -Sy --noconfirm python python-pip git curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and package
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run Pacman package manager tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_pacman.py -v

      - name: Run CLI installer tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cli_installer.py -v

      - name: Run CUDA installation tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_cuda_installation.py -v

      - name: Run secure boot tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_secure_boot.py -v

  matrix:
    name: Matrix System
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and package
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run matrix tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_matrix.py -v

      - name: Run compatibility tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_compatibility.py -v

  uninstaller:
    name: Uninstaller Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and package
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run uninstaller tests
        run: |
          . .venv/bin/activate
          python3 -m pytest tests/test_uninstaller.py -v
