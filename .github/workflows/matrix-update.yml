name: Update Compatibility Matrix

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if up to date'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest driver versions
        run: python scripts/update-matrix.py --check

      - name: Update matrix
        id: update
        run: |
          if python scripts/update-matrix.py; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if updated
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update compatibility matrix'
          title: 'chore: update compatibility matrix'
          body: |
            ## Summary
            Compatibility matrix has been updated with the latest driver versions from Nvidia.

            This PR was automatically generated by the matrix-update workflow.
          branch: chore/update-matrix
          delete-branch: true
          labels: |
            automated
            dependencies
